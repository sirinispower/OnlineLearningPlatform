server:
  port: 8080

spring:
  application:
    name: online-learning-platform
  datasource:
    url: jdbc:mysql://localhost:3306/online_learning?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 5267959aaa
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

jwt:
  secret: online-learning-platform-secret-key-2024-very-long-and-secure
  expiration: 86400000

file:
  upload:
    # 留空则默认保存到项目根目录 uploads/ 下；也可指定绝对路径
    base-dir:

logging:
  level:
    com.onlinelearning: debug
